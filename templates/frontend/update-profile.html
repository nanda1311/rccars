{% extends 'frontend/base.html' %}
{% load static %}

{% block title %}
<title>Update Profile | Profile</title>
{% endblock title %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">




<body>
<div class="container1">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>My Profile</h2>
    <a href="{% url 'profile' %}"><button>Dashboard</button></a>
    <a href="{% url 'orders_page' %}"><button>Orders</button></a>
    <a href="{% url 'address_profile' %}"><button>Addresses</button></a>
    <a href="{% url 'update_profile' %}"><button style="background:#5f5f5f;color:#fff;">Update Profile</button></a>
    <a href="{% url 'logout_page' %}"><button>Log Out</button></a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2>Update Profile</h2>

    {% if messages %}
      {% for message in messages %}
        <div style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %}; margin-bottom: 10px;">
            {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      
      <label for="username">Username</label>
      <input type="text" name="username" id="username" value="{{ user.username }}" required>

      <label for="email">Email</label>
      <input type="email" name="email" id="email" value="{{ user.email }}" required>


      <label for="current_password">Current Password</label>
      <input type="password" name="current_password" id="current_password" placeholder="Enter current password">

      <label for="new_password">New Password</label>
      <input type="password" name="new_password" id="new_password" placeholder="Enter new password">

      <label for="confirm_password">Confirm New Password</label>
      <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm new password">

      <button type="submit">Save Changes</button>
    </form>
  </div>
</div>
</body>


    <style>
 /* =============================================
   UPDATE PROFILE PAGE – REDESIGNED WITH NEUTRAL PALETTE
   ============================================= */

/* Import Inter Font */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
    --primary: #5f5f5f;
    --primary-light: #e8e8e8;
    --primary-dark: #4a4a4a;
    --secondary: #4a5568;
    --success: #48bb78;
    --danger: #f56565;
    --warning: #ecc94b;
    --text-primary: #2d3748;
    --text-secondary: #718096;
    --text-muted: #a0aec0;
    --bg-light: #f7fafc;
    --bg-white: #ffffff;
    --border-light: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f8fafc;
    color: var(--text-primary);
    line-height: 1.5;
}

/* Main Container */
.container1 {
    max-width: 1266px;
    margin: 8px auto 20px;
    background: var(--bg-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    display: flex;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: var(--bg-white);
    padding: 32px 20px;
    border-right: 1px solid var(--border-light);
}

.sidebar h2 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 24px;
    padding-left: 8px;
}

.sidebar a {
    text-decoration: none;
    display: block;
}

.sidebar button {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 8px;
    background: var(--bg-white);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
}

.sidebar button:hover {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
}

.sidebar button[style*="background:#5f5f5f"] {
    background: var(--primary) !important;
    border-color: var(--primary) !important;
    color: white !important;
}

/* Main Content */
.main-content {
    flex: 1;
    padding: 32px;
    max-width: calc(100% - 260px);
}

.main-content h2 {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 24px;
}

/* Messages */
.main-content div[style*="color:"] {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
    font-size: 0.95rem;
    font-weight: 500;
}

.main-content div[style*="color: green"] {
    background: #f0f9f0;
    color: #2f6e2f !important;
    border: 1px solid #c6f6d5;
}

.main-content div[style*="color: red"] {
    background: #fef2f2;
    color: #b33c3c !important;
    border: 1px solid #fed7d7;
}

/* Form Styles */
.update-section form,
.main-content form {
    max-width: 600px;
    margin-top: 24px;
}

.main-content form label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.main-content form input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    background: var(--bg-white);
}

.main-content form input:hover {
    border-color: var(--text-muted);
}

.main-content form input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
}

.main-content form input::placeholder {
    color: var(--text-muted);
    font-size: 0.9rem;
    opacity: 0.7;
}

/* Separator */
hr {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: 28px 0 !important;
}

/* Submit Button */
.main-content form button[type="submit"] {
    background: var(--primary);
    color: white;
    padding: 12px 32px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 16px;
    min-width: 160px;
}

.main-content form button[type="submit"]:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

.main-content form button[type="submit"]:active {
    transform: translateY(0);
} 

/* Password Section Heading (implied) */
.main-content form label[for="current_password"] {
    margin-top: 8px;
}

/* Form Group Spacing */
.main-content form br {
    display: none;
}

/* =============================================
   RESPONSIVE DESIGN
   ============================================= */

/* Tablet Styles */
@media (max-width: 768px) {
    .container1 {
        flex-direction: column;
        margin: 100px 20px 40px;
        border-radius: var(--radius-md);
    }

    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        padding: 24px 20px;
    }

    .sidebar h2 {
        margin-bottom: 16px;
        font-size: 1.3rem;
    }
    .sidebar button {
        width: 100%;
        margin-bottom: 6px;
        display: inline-block;
        margin-right: 8px;
        padding: 8px 16px;
    }


    .main-content {
        max-width: 100%;
        padding: 24px 20px;
    }

    .main-content h2 {
        font-size: 1.5rem;
    }

    .main-content form {
        max-width: 100%;
    }
}

/* Mobile Styles */
@media (max-width: 500px) {
    .container1 {
        margin: 1px 12px 24px;
        border-radius: var(--radius-sm);
    }

    .sidebar {
        padding: 20px 16px;
        overflow-x: auto;
        white-space: nowrap;
    }

    .sidebar h2 {
        display: none;
    }
    .sidebar button {
        width: 100%;
        margin-bottom: 6px;
        display: inline-block;
        margin-right: 8px;
        padding: 8px 16px;
    }


    .main-content {
        padding: 20px 16px;
    }

    .main-content h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
    }

    /* Form Mobile Styles */
    .main-content form label {
        font-size: 0.85rem;
        margin-bottom: 4px;
    }

    .main-content form input {
        padding: 8px 12px;
        font-size: 0.9rem;
        margin-bottom: 16px;
    }

    .main-content form input::placeholder {
        font-size: 0.85rem;
    }

    hr {
        margin: 20px 0 !important;
    }

    .main-content form button[type="submit"] {
        width: 100%;
        padding: 12px 20px;
        font-size: 0.95rem;
        min-width: auto;
    }

    /* Message Mobile Styles */
    .main-content div[style*="color:"] {
        padding: 10px 14px;
        font-size: 0.9rem;
    }
}

/* Small Mobile Styles */
@media (max-width: 360px) {
    .container1 {
        margin: 1px 8px 20px;
    }

    .sidebar button {
        width: 100%;
        margin-bottom: 6px;
        display: inline-block;
        margin-right: 8px;
        padding: 8px 16px;
    }


    .main-content {
        padding: 16px 12px;
    }

    .main-content h2 {
        font-size: 1.2rem;
    }

    .main-content form input {
        padding: 8px 10px;
        font-size: 0.85rem;
    }
}

/* Password Strength Indicator (optional enhancement) */
.password-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: -12px;
    margin-bottom: 16px;
}

/* Form Validation States */
.main-content form input:invalid:not(:placeholder-shown) {
    border-color: var(--danger);
}

.main-content form input:valid:not(:placeholder-shown) {
    border-color: var(--success);
}

/* =============================================
   UTILITY CLASSES
   ============================================= */
.text-muted {
    color: var(--text-muted);
}

.text-success {
    color: var(--success);
}

.text-danger {
    color: var(--danger);
}

.mb-2 {
    margin-bottom: 8px;
}

.mb-3 {
    margin-bottom: 16px;
}

.mb-4 {
    margin-bottom: 24px;
}

.mt-3 {
    margin-top: 16px;
}

.mt-4 {
    margin-top: 24px;
}

    </style>
{% endblock content %}
